name: interviewloop-v2

x-backend-env: &backend-env
  env_file:
    - path: ./backend/.env.example
      required: false
    - path: ./.env
      required: false
  environment:
    APP_ENV: production
    DATABASE_URL: postgresql+psycopg://interviewloop:interviewloop@postgres:5432/interviewloop
    REDIS_URL: redis://redis:6379/0
    OLLAMA_BASE_URL: http://ollama:11434
    REPORT_STORAGE_DIR: /app/storage/reports
    DOCKER_HOST: unix:///var/run/docker.sock

x-backend-image: &backend-image
  build:
    context: ./backend
  image: interviewloop-v2-backend:latest

x-backend-depends: &backend-depends
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "80:80"
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - public
      - app

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api/v1
    image: interviewloop-v2-frontend:latest
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - app

  backend:
    <<: [*backend-image, *backend-env]
    depends_on: *backend-depends
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    volumes:
      - backend_reports:/app/storage/reports
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app
      - data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: interviewloop
      POSTGRES_USER: interviewloop
      POSTGRES_PASSWORD: interviewloop
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interviewloop -d interviewloop"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --save 60 1000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - data

  celery:
    <<: [*backend-image, *backend-env]
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info --queues=default,analytics,email,maintenance,reports --hostname=worker@%h
    depends_on: *backend-depends
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app.celery_app inspect ping --timeout=10 | grep -q pong"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 45s
    restart: unless-stopped
    volumes:
      - backend_reports:/app/storage/reports
    networks:
      - app
      - data

  celery-beat:
    <<: [*backend-image, *backend-env]
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    depends_on: *backend-depends
    restart: unless-stopped
    volumes:
      - celery_beat_data:/tmp
    networks:
      - data

  flower:
    <<: [*backend-image, *backend-env]
    command: celery -A app.workers.celery_app.celery_app flower --address=0.0.0.0 --port=5555 --persistent=True --db=/data/flower.db
    depends_on:
      redis:
        condition: service_healthy
      celery:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5555/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    ports:
      - "127.0.0.1:5555:5555"
    restart: unless-stopped
    volumes:
      - flower_data:/data
    networks:
      - data

  ollama:
    image: ollama/ollama:latest
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    ports:
      - "127.0.0.1:11434:11434"
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - app

volumes:
  backend_reports:
  celery_beat_data:
  flower_data:
  ollama_data:
  postgres_data:
  redis_data:

networks:
  public:
  app:
  data:
    internal: true
