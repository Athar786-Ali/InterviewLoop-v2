name: interviewloop-v2

x-backend-env: &backend-env
  env_file:
    - path: ./backend/.env.example
      required: false
    - path: ./.env
      required: false
  environment:
    APP_ENV: production
    AUTO_CREATE_TABLES: "true"
    DATABASE_URL: postgresql+psycopg://interviewloop:interviewloop@postgres:5432/interviewloop
    OLLAMA_BASE_URL: http://ollama:11434
    OLLAMA_MODEL: qwen2.5:3b
    OLLAMA_TIMEOUT_SECONDS: "120"
    REPORT_STORAGE_DIR: /app/storage/reports
    DOCKER_HOST: unix:///var/run/docker.sock

x-backend-image: &backend-image
  build:
    context: ./backend
  image: interviewloop-v2-backend:latest

x-backend-depends: &backend-depends
  postgres:
    condition: service_healthy

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "80:80"
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - public
      - app

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api/v1
    image: interviewloop-v2-frontend:latest
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - app

  backend:
    <<: [*backend-image, *backend-env]
    depends_on: *backend-depends
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    volumes:
      - backend_reports:/app/storage/reports
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app
      - data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: interviewloop
      POSTGRES_USER: interviewloop
      POSTGRES_PASSWORD: interviewloop
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interviewloop -d interviewloop"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data

  ollama:
    image: ollama/ollama:latest
    environment:
      # Prevent OOM kills: limit to one model loaded, one parallel request
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_KEEP_ALIVE: "10m"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    ports:
      - "127.0.0.1:11434:11434"
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - app

volumes:
  backend_reports:
  ollama_data:
  postgres_data:

networks:
  public:
  app:
  data:
    internal: true
